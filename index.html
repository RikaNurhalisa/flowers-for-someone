<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="shortcut icon" href="images/gift.png" type="image/x-icon" />
  <link rel="stylesheet" href="css/index.css" />

  <title>FLOWERS FOR SOMEONE</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: "Poppins", sans-serif;
    }

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      text-align: center;
      width: 90%;
      z-index: 10;
    }

    .subtitle {
      color: #ffffffcc;
      font-size: 1.2rem;
      letter-spacing: 3px;
      margin-bottom: 20px;
      animation: fadeUp 1.5s ease;
    }

    .name {
      font-size: 4rem;
      font-weight: bold;
      color: #ffb7d5;
      text-shadow:
        0 0 10px #ffb7d5,
        0 0 20px #ffb7d5,
        0 0 40px #ff69b4;
      margin-bottom: 25px;
      animation: glow 2s infinite alternate;
    }

    .message {
      color: white;
      font-size: 1.1rem;
      line-height: 1.8;
      max-width: 700px;
      margin: auto;
      margin-bottom: 40px;
      opacity: 0.9;
      animation: fadeUp 2s ease;
    }

    .button-container {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 30px;
    }

    .btn {
      padding: 16px 40px;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      text-decoration: none;
      font-size: 1rem;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
    }

    .btn:hover {
      background: #ff69b4;
      transform: scale(1.05);
      box-shadow: 0 0 25px #ff69b4;
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 10px #ffb7d5,
          0 0 20px #ffb7d5;
      }

      to {
        text-shadow:
          0 0 20px #ff69b4,
          0 0 40px #ff69b4,
          0 0 60px #ff69b4;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <!-- Background -->
  <div class="night"></div>

  <!-- Content -->
  <div class="content">

    <div class="subtitle">
      🌸 A SPECIAL FLOWER FOR SOMEONE SPECIAL 🌸
    </div>

    <div class="name">
      REYSA AHRIANSYAH NUR ❤️
    </div>

    <div class="message">
        Dari sekian banyak hal indah di dunia, aku bersyukur bisa mengenal kamu.
      <br>
      Terima kasih sudah hadir, Semoga apa pun yang kamu jalani selalu dipenuhi bahagia, tenang, dan banyak hal baik ✨
    </div>

    <!-- Button Tengah -->
    <div class="button-container">
      <a href="flower.html" class="btn">
        Open My Heart 💖
      </a>
    </div>

  </div>

  <script src="js/index.js"></script>

</body>

</html>
